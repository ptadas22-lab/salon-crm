<!DOCTYPE html>
<html>
<head>
  <title>Salon CRM</title>
</head>

<body>

<h2>BookIt - Salon Client Manager</h2>

<p style="font-size:12px;color:gray;">
Your data is securely stored and accessible only to you.
</p>

<input id="clientName" placeholder="Name"><br><br>
<input id="clientPhone" placeholder="Phone"><br><br>
<input id="clientNotes" placeholder="Notes"><br><br>

<button onclick="addClient()">Add Client</button>

<h3>Client List</h3>
<ul id="clientContainer"></ul>

<script>

// ✅ ADD CLIENT
async function addClient() {
  let name = document.getElementById("clientName").value;
  let phone = document.getElementById("clientPhone").value;
  let notes = document.getElementById("clientNotes").value;

  if (!name || !phone) {
    alert("Enter name and phone");
    return;
  }

  let res = await fetch("https://rgcaxgfzzfdscocllfjb.supabase.co/rest/v1/clients", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": "sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
      "Authorization": "Bearer sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n"
    },
    body: JSON.stringify({
      name,
      phone,
      notes,
      visits: 1
    })
  });

  if (res.ok) {
    alert("Client added ✅");
    fetchClients();

    // clear inputs
    document.getElementById("clientName").value = "";
    document.getElementById("clientPhone").value = "";
    document.getElementById("clientNotes").value = "";
  } else {
    let err = await res.text();
    alert("Error: " + err);
  }
}

// ✅ FETCH CLIENTS
async function fetchClients() {
  let res = await fetch("https://rgcaxgfzzfdscocllfjb.supabase.co/rest/v1/clients", {
    headers: {
      "apikey": "sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
      "Authorization": "Bearer sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n"
    }
  });

  let data = await res.json();

  let container = document.getElementById("clientContainer");
  container.innerHTML = "";

  data.forEach(c => {
    container.innerHTML += `
      <li style="margin-bottom:10px;">
        <b>${c.name}</b><br>
        📞 ${c.phone}<br>
        📝 ${c.notes}<br>
        <button onclick="deleteClient(${c.id})">Delete</button>
        <button onclick="editClient(${c.id})">Edit</button>
      </li>
    `;
  });
}

// ✅ DELETE CLIENT
async function deleteClient(id) {
  let confirmDelete = confirm("Delete this client?");
  if (!confirmDelete) return;

  let res = await fetch(\`https://rgcaxgfzzfdscocllfjb.supabase.co/rest/v1/clients?id=eq.\${id}\`, {
    method: "DELETE",
    headers: {
      "apikey": "sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
      "Authorization": "Bearer sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n"
    }
  });

  if (res.ok) {
    alert("Deleted ✅");
    fetchClients();
  } else {
    let err = await res.text();
    alert("Error: " + err);
  }
}

// ✅ EDIT CLIENT (SAFE VERSION)
async function editClient(id) {
  let name = prompt("Enter new name");
  let phone = prompt("Enter new phone");
  let notes = prompt("Enter new notes");

  if (!name || !phone) return;

  let res = await fetch(\`https://rgcaxgfzzfdscocllfjb.supabase.co/rest/v1/clients?id=eq.\${id}\`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": "sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
      "Authorization": "Bearer sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n"
    },
    body: JSON.stringify({
      name,
      phone,
      notes
    })
  });

  if (res.ok) {
    alert("Updated ✅");
    fetchClients();
  } else {
    let err = await res.text();
    alert("Error: " + err);
  }
}

// load data
fetchClients();

</script>

</body>
</html>
