<!DOCTYPE html>
<html>
<head>
  <title>Salon CRM</title>
</head>

<body>

<h2>BookIt - Salon Client Manager</h2>

<input id="clientName" placeholder="Name"><br><br>
<input id="clientPhone" placeholder="Phone"><br><br>
<input id="clientNotes" placeholder="Notes"><br><br>

<button id="addBtn">Add Client</button>

<h3>Client List</h3>
<ul id="clientContainer"></ul>

<script>

// ✅ BUTTON EVENT (NO onclick issues)
document.addEventListener("DOMContentLoaded", function () {
  document.getElementById("addBtn").addEventListener("click", addClient);
  fetchClients();
});

// ✅ ADD CLIENT
async function addClient() {
  const name = document.getElementById("clientName").value.trim();
  const phone = document.getElementById("clientPhone").value.trim();
  const notes = document.getElementById("clientNotes").value.trim();

  if (!name || !phone) {
    alert("Enter name and phone");
    return;
  }

  try {
    const res = await fetch("https://rgcaxgfzzfdscocllfjb.supabase.co/rest/v1/clients", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": "sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
        "Authorization": "Bearer sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
        "Prefer": "return=representation"
      },
      body: JSON.stringify({
        name: name,
        phone: phone,
        notes: notes,
        visits: 1
      })
    });

    if (!res.ok) {
      const err = await res.text();
      alert("Error: " + err);
      return;
    }

    alert("Client added ✅");

    // clear fields
    document.getElementById("clientName").value = "";
    document.getElementById("clientPhone").value = "";
    document.getElementById("clientNotes").value = "";

    fetchClients();

  } catch (err) {
    alert("Network error");
    console.log(err);
  }
}

// ✅ FETCH CLIENTS
async function fetchClients() {
  try {
    const res = await fetch("https://rgcaxgfzzfdscocllfjb.supabase.co/rest/v1/clients", {
      headers: {
        "apikey": "sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
        "Authorization": "Bearer sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n"
      }
    });

    const data = await res.json();

    const container = document.getElementById("clientContainer");
    container.innerHTML = "";

    data.forEach(c => {
      const li = document.createElement("li");
      li.innerHTML = `
        <b>${c.name}</b> (${c.phone})
        <button onclick="deleteClient(${c.id})">Delete</button>
      `;
      container.appendChild(li);
    });

  } catch (err) {
    console.log(err);
  }
}

// ✅ DELETE CLIENT
async function deleteClient(id) {
  await fetch(`https://rgcaxgfzzfdscocllfjb.supabase.co/rest/v1/clients?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      "apikey": "sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n",
      "Authorization": "Bearer sb_publishable_I_qG_y6rTCKfhAQSKf3wLw_Q-fdNK1n"
    }
  });

  fetchClients();
}

</script>

</body>
</html>
